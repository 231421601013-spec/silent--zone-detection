<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Zone — Marine AI Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --abyss:       #020b14;
            --deep:        #041225;
            --mid:         #062040;
            --surface:     #0a3060;
            --glass:       rgba(6, 32, 64, 0.6);
            --glass-light: rgba(10, 48, 96, 0.4);
            --border:      rgba(0, 180, 255, 0.15);
            --border-hot:  rgba(0, 220, 180, 0.35);
            --cyan:        #00dcc8;
            --blue:        #00aaff;
            --pulse:       #00ff88;
            --danger:      #ff4560;
            --warn:        #ffa500;
            --text:        #cde8ff;
            --text-dim:    rgba(180, 220, 255, 0.55);
            --text-muted:  rgba(140, 190, 230, 0.35);
            --radius:      16px;
            --radius-lg:   24px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--abyss);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── ANIMATED OCEAN BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,170,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(0,220,200,0.06) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,100,200,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: breathe 12s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0%   { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1;   transform: scale(1.03); }
        }

        /* ── PARTICLE DOTS ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(0,220,200,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 15%, rgba(0,170,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 60%, rgba(0,220,200,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 75%, rgba(0,170,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 85%, rgba(0,255,136,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 50%, rgba(0,220,200,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 35%, rgba(0,170,255,0.3) 0%, transparent 100%);
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 0;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* ── NAVBAR ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: rgba(2, 11, 20, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(0,220,200,0.4);
        }

        .nav-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .nav-title span {
            color: var(--cyan);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-pill {
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-pill:hover {
            color: var(--cyan);
            border-color: var(--border-hot);
            background: var(--glass-light);
        }

        .nav-pill.active {
            color: var(--cyan);
            background: rgba(0,220,200,0.1);
            border-color: var(--border-hot);
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--pulse);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--pulse);
            animation: blink 1.8s ease-in-out infinite;
            box-shadow: 0 0 8px var(--pulse);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── GLASS CARD ── */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(16px);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,220,200,0.4), transparent);
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h5, .card-header h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .card-body { padding: 24px; }

        /* ── INPUTS ── */
        .form-control, .form-select {
            background: rgba(4, 18, 37, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0, 220, 200, 0.05);
            box-shadow: 0 0 0 3px rgba(0,220,200,0.12);
            color: #fff;
        }

        .form-control::placeholder { color: var(--text-muted); }

        .form-select option {
            background: var(--deep);
            color: var(--text);
        }

        .form-label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            border: none;
            border-radius: 12px;
            color: var(--abyss);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 14px 28px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 24px rgba(0,220,200,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,220,200,0.5);
        }

        .btn-primary:hover::before { opacity: 1; }
        .btn-primary:active { transform: translateY(0); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-hot);
            border-radius: 10px;
            color: var(--cyan);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 8px 18px;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-outline:hover {
            background: rgba(0,220,200,0.1);
            box-shadow: 0 0 16px rgba(0,220,200,0.2);
        }

        /* ── BADGES ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 100px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-safe    { background: rgba(0,255,136,0.15); color: var(--pulse); border: 1px solid rgba(0,255,136,0.3); }
        .badge-warn    { background: rgba(255,165,0,0.15);  color: var(--warn);  border: 1px solid rgba(255,165,0,0.3); }
        .badge-danger  { background: rgba(255,69,96,0.15);  color: var(--danger);border: 1px solid rgba(255,69,96,0.3); }
        .badge-info    { background: rgba(0,170,255,0.15);  color: var(--blue);  border: 1px solid rgba(0,170,255,0.3); }
        .badge-live    { background: rgba(0,255,136,0.1);   color: var(--pulse); border: 1px solid rgba(0,255,136,0.25); animation: blink 2s infinite; }

        /* ── STAT CARD ── */
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--border-hot);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
        }

        .stat-card.cyan::after  { background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
        .stat-card.pulse::after { background: linear-gradient(90deg, transparent, var(--pulse), transparent); }
        .stat-card.warn::after  { background: linear-gradient(90deg, transparent, var(--warn), transparent); }
        .stat-card.danger::after{ background: linear-gradient(90deg, transparent, var(--danger), transparent); }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            line-height: 1;
            color: #fff;
        }

        .stat-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
        }

        .stat-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .stat-icon.cyan   { background: rgba(0,220,200,0.15); color: var(--cyan); }
        .stat-icon.pulse  { background: rgba(0,255,136,0.15); color: var(--pulse); }
        .stat-icon.warn   { background: rgba(255,165,0,0.15);  color: var(--warn); }
        .stat-icon.danger { background: rgba(255,69,96,0.15);  color: var(--danger); }

        /* ── GRID UTILS ── */
        .grid { display: grid; }
        .g-2 { gap: 8px; }
        .g-3 { gap: 16px; }
        .g-4 { gap: 24px; }
        .g-5 { gap: 32px; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }
        .cols-12 { grid-template-columns: 2fr 1fr; }
        .cols-21 { grid-template-columns: 1fr 2fr; }

        /* ── LAYOUT ── */
        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 88px 32px 60px;
            position: relative;
            z-index: 1;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--abyss); }
        ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 3px; }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 8px 0;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: #fff;
            margin-bottom: 4px;
        }

        .section-sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        /* ── MONO TEXT ── */
        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .cols-2, .cols-3, .cols-4, .cols-12, .cols-21 {
                grid-template-columns: 1fr;
            }
            nav { padding: 0 20px; }
            .page-wrap { padding: 80px 16px 40px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <a class="nav-brand" href="/">
        <div class="nav-logo">🐋</div>
        <span class="nav-title">Silent<span>Zone</span></span>
    </a>

    <div class="nav-links">
        <a href="/upload" class="nav-pill">Analysis</a>
        <a href="/results" class="nav-pill">Results</a>
        <a href="/logout" class="nav-pill">Logout</a>
    </div>

    <div class="nav-status">
        <div class="status-dot"></div>
        OCEAN MONITOR LIVE
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
